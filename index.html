<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>swarmeq™</title>
<meta name="description" content="Affective-state observability for AI agents and multi-agent systems.">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    text-align: center;
    padding: 2rem;
  }
  main { max-width: 600px; }
  h1 {
    font-size: clamp(3rem, 10vw, 5rem);
    margin: 0 0 1.5rem;
    font-weight: 200;
    letter-spacing: -0.04em;
  }
  .tm { font-size: 0.35em; vertical-align: super; opacity: 0.5; margin-left: 0.1em; }
  p { opacity: 0.7; line-height: 1.6; font-size: 1.1rem; }
  a { color: #f0f0f0; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 4px; }
  a:hover { opacity: 0.8; }
  .footer { margin-top: 3rem; font-size: 0.85rem; opacity: 0.5; }
</style>
</head>
<body>
<main>
  <h1>swarmeq<span class="tm">™</span></h1>
  <p>Affective-state observability for AI agents and multi-agent systems.</p>
  <p>Coming soon.</p>
  <p class="footer"><a href="https://github.com/swarmeq">github.com/swarmeq</a></p>
</main>
</body>
</html>
